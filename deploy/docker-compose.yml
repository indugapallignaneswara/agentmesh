# Local development stack for AgentMesh: Postgres (authoritative store) and
# NATS with JetStream (real-time fan-out). Bring it up, then run the server
# with `make run` against these.
#
#   docker compose -f deploy/docker-compose.yml up -d

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: agentmesh
      POSTGRES_PASSWORD: agentmesh
      POSTGRES_DB: agentmesh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentmesh"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.11
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"  # client
      - "8222:8222"  # monitoring
    volumes:
      - natsdata:/data

volumes:
  pgdata:
  natsdata:
