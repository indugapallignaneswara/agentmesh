name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release
  packages: write # push to GHCR

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # A tag should never ship code the contract suite hasn't passed, so gate
    # the release on the full test suite with a real Postgres.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: agentmesh
          POSTGRES_PASSWORD: agentmesh
          POSTGRES_DB: agentmesh_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U agentmesh"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser needs full history for the changelog

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test (race + Postgres contract suite)
        env:
          AGENTMESH_TEST_DATABASE_URL: postgres://agentmesh:agentmesh@localhost:5432/agentmesh_test?sslmode=disable
        run: go test -race -count=1 ./...

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
