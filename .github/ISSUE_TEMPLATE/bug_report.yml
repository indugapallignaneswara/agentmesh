name: Bug report
description: Something behaves incorrectly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Security issue?** Don't file it here — see [SECURITY.md](https://github.com/indugapallignaneswara/agentmesh/blob/main/SECURITY.md).

  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did, what you expected, what you got instead.
      placeholder: |
        I called read_inbox with ack_mode and ...
        I expected ... but got ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: The smallest sequence that shows it. Exact commands/tool calls are ideal.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag or commit SHA (`agentmesh` logs it on start).
    validations:
      required: true

  - type: dropdown
    id: store
    attributes:
      label: Store
      options: [postgres, memory]
    validations:
      required: true

  - type: dropdown
    id: auth
    attributes:
      label: Auth mode
      options: [off, token, oauth]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Server output around the failure. Redact tokens.
      render: shell
